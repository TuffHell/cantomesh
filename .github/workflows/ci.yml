name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Core + dev only; pycantonese/anthropic stay optional so the
          # symbolic engine is verified on its deterministic fallback path.
          pip install fastapi "uvicorn[standard]" "pydantic>=2.6" pytest httpx
      - name: Run tests
        run: pytest -q
